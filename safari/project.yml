name: OpenBiliClawSafari
options:
  bundleIdPrefix: io.github.whiteguo233
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    # Ad-hoc sign by default so the project builds and runs locally
    # without any Apple Developer account configured. If you have a
    # team, switch to:
    #   CODE_SIGN_STYLE: Automatic
    #   DEVELOPMENT_TEAM: <YOUR_TEAM_ID>
    # and remove CODE_SIGN_IDENTITY, then re-run `xcodegen generate`.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "0.3.24"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    ENABLE_HARDENED_RUNTIME: YES
    # We hand-write Info.plist files (see App/Info.plist,
    # Extension/Info.plist) so this must be NO and we set INFOPLIST_FILE
    # per target. We deliberately do NOT use XcodeGen's `info:` block,
    # which would overwrite the committed Info.plist on every
    # `xcodegen generate` run.
    GENERATE_INFOPLIST_FILE: NO

targets:
  OpenBiliClaw:
    type: application
    platform: macOS
    sources:
      - path: App
    resources:
      - path: App/Assets.xcassets
      - path: App/Base.lproj/Main.storyboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.whiteguo233.openbiliclaw
        CODE_SIGN_ENTITLEMENTS: App/OpenBiliClaw.entitlements
        INFOPLIST_FILE: App/Info.plist
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - target: OpenBiliClawExtension
        embed: true
        codeSign: true

  OpenBiliClawExtension:
    type: app-extension
    platform: macOS
    productName: OpenBiliClaw Extension
    sources:
      - path: Extension
        excludes:
          - Resources/**
          - Info.plist
          - "*.entitlements"
    # NO `resources:` block.
    #
    # We deliberately do NOT add Extension/Resources/ as a folder
    # reference (`type: folder`) or as a group of files. Both have
    # problems:
    #
    #   - Folder reference: Xcode preserves the folder NAME when
    #     copying it into the bundle, so manifest.json would end up at
    #     `OpenBiliClaw Extension.appex/Contents/Resources/Resources/manifest.json`
    #     — one level too deep. Safari then can't find the manifest
    #     and silently refuses to register the extension (no error in
    #     the build, no entry in Safari's Extensions list).
    #
    #   - Group of files: only files present at `xcodegen generate`
    #     time are included. Any file added later by package-safari.mjs
    #     would be missing.
    #
    # Instead, a postBuildScript below rsyncs the contents of
    # Extension/Resources/ into the bundle's Resources directory at
    # build time. This produces the correct flat layout and picks up
    # any file added by `npm run package:safari` without needing a
    # project regeneration.
    postBuildScripts:
      - name: Stage WebExtension Resources into bundle
        shell: /bin/bash
        # Always re-run this phase. The script is fast (rsync only
        # copies what changed) and we can't easily enumerate inputs
        # for Xcode's dependency analysis since the file set is
        # generated by an external build.
        basedOnDependencyAnalysis: false
        script: |
          set -e -o pipefail

          # Xcode supplies these for any macOS bundle target. We assert
          # them explicitly rather than relying on `set -u`, because
          # `set -u` also trips on every optional env var the project
          # might inherit, producing confusing failures.
          : "${SRCROOT:?SRCROOT must be set by Xcode}"
          : "${TARGET_BUILD_DIR:?TARGET_BUILD_DIR must be set by Xcode}"
          : "${CONTENTS_FOLDER_PATH:?CONTENTS_FOLDER_PATH must be set by Xcode}"

          SRC="${SRCROOT}/Extension/Resources"
          # CONTENTS_FOLDER_PATH on macOS is "<bundle>.appex/Contents".
          # The Resources folder lives directly inside Contents/.
          DST="${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Resources"

          if [ ! -f "$SRC/manifest.json" ]; then
            echo "error: $SRC/manifest.json is missing." >&2
            echo "error: Run 'npm run package:safari' from the extension/ directory before building." >&2
            exit 1
          fi

          mkdir -p "$DST"
          # Copy CONTENTS of Extension/Resources/ into the bundle's
          # Resources/, flattened (trailing slash on $SRC). --delete
          # removes stale files left over from previous builds.
          rsync -a --delete \
            --exclude='.gitkeep' \
            --exclude='README.md' \
            "$SRC/" "$DST/"

          echo "✓ Staged WebExtension resources → $DST"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.whiteguo233.openbiliclaw.extension
        CODE_SIGN_ENTITLEMENTS: Extension/OpenBiliClaw_Extension.entitlements
        INFOPLIST_FILE: Extension/Info.plist
        SKIP_INSTALL: YES
