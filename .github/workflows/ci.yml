name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        # Include the optional `x` extra (twitter-cli) so the X-source test
        # suite (tests/test_x_client.py etc.) can construct real tweet objects
        # and run; without it those tests error with ModuleNotFoundError.
        run: python -m pip install -e ".[dev,x]"

      - name: Run Ruff
        run: python -m ruff check src/ tests/

      - name: Run MyPy
        run: python -m mypy src/

      - name: Run pytest
        run: python -m pytest -q

  extension-firefox-build:
    name: Smoke-build Firefox extension
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install extension dependencies
        run: npm ci
        working-directory: extension

      - name: Build Firefox extension
        run: npm run build:firefox
        working-directory: extension

      - name: Verify Firefox manifest at dist-firefox root
        shell: bash
        working-directory: extension
        run: |
          test -f dist-firefox/manifest.json
          # Confirm version was injected from manifest.json
          chrome_version=$(node -e "console.log(JSON.parse(require('fs').readFileSync('manifest.json','utf-8')).version)")
          firefox_version=$(node -e "console.log(JSON.parse(require('fs').readFileSync('dist-firefox/manifest.json','utf-8')).version)")
          if [ "$chrome_version" != "$firefox_version" ]; then
            echo "version mismatch: manifest.json=$chrome_version vs dist-firefox/manifest.json=$firefox_version"
            exit 1
          fi
          echo "Firefox manifest version $firefox_version matches manifest.json"

  web-guided-init-e2e:
    name: Web guided-init E2E
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e ".[dev,browser]"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run web guided-init E2E
        run: python -m pytest -q tests/test_web_guided_init_e2e.py
